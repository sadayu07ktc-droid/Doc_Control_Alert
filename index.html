<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>การแจ้งเตือนของฉัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* ตั้งค่าสีพื้นหลังและตัวอักษรให้ตรงกับธีมเดิม */
        body {
            background-color: #121A2F;
            color: #FFFFFF;
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: #1E2A44;
            width: 100%;
            max-width: 400px;
            padding: 25px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }

        /* ส่วนหัวข้อ */
        .header-title {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .header-title h3 {
            margin: 0;
            color: #FFB700;
            font-weight: 500;
            font-size: 22px;
        }
        
        .header-title p {
            margin: 5px 0 0 0;
            font-size: 13px;
            color: #8C9BB4;
        }

        /* การจัดฟอร์ม */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #A3B1C6;
            margin-bottom: 8px;
        }

        /* ตกแต่งกล่องข้อความทั่วไป */
        input[type="text"],
        input[type="number"],
        input[type="time"],
        select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #2C3E5D;
            background-color: #121A2F;
            color: #FFFFFF;
            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #FFB700;
            box-shadow: 0 0 0 2px rgba(255, 183, 0, 0.2);
        }

        ::placeholder {
            color: #5C6A82;
        }

        /* ปรับแต่ง Dropdown ให้มีลูกศรสีเหลืองสวยงาม */
        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FFB700' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            padding-right: 40px;
            cursor: pointer;
        }

        /* เปลี่ยนสีไอคอนนาฬิกาของ input type="time" ให้กลืนกับธีม */
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(70%) sepia(80%) saturate(1000%) hue-rotate(350deg) brightness(110%) contrast(110%);
            cursor: pointer;
        }

        /* ปุ่มบันทึก */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #FFB700;
            color: #121A2F;
            border: none;
            border-radius: 10px;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #E5A400;
        }

        /* ซ่อนส่วนที่ยังไม่ต้องแสดง */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">
            <h3>🔔 ตั้งค่าการแจ้งเตือน</h3>
            <label for="docSelect">เลือกเอกสารในระบบ</label>
            <select id="docSelect" onchange="onSelectDocument()" required>
              <option value="" disabled selected>กำลังโหลดเอกสาร...</option>
            </select>
            <p id="docNameDisplay">กรุณาเลือกเอกสารที่ต้องการตั้งค่าแจ้งเตือน</p>
        </div>
        
        <form id="alertForm">
            <input type="hidden" id="rowIdx" name="rowIdx">
            <input type="hidden" id="userId" name="userId">
            <input type="hidden" id="docName" name="docName">

            <div class="form-group">
                <label for="alertTopic">หัวข้อการแจ้งเตือน</label>
                <select id="alertTopic" required>
                    <option value="" disabled selected>-- เลือกหัวข้อ --</option>
                    <option value="เตือนแจ้งรายงาน">📝 เตือนแจ้งรายงาน</option>
                    <option value="อัพเดทรายงาน">🔄 อัพเดทรายงาน</option>
                    <option value="ส่งเอกสาร">📤 ส่งเอกสาร</option>
                    <option value="อื่นๆ">✨ อื่นๆ</option>
                </select>
            </div>

            <div class="form-group">
                <label for="frequencyType">รูปแบบความถี่</label>
                <select id="frequencyType" onchange="toggleDateFields()" required>
                    <option value="" disabled selected>-- เลือกความถี่ --</option>
                    <option value="สัปดาห์">📅 รายสัปดาห์ (เลือกวัน)</option>
                    <option value="ทุกเดือน">🗓️ ทุกเดือน (ระบุวันที่)</option>
                    <option value="ทุก 3 เดือน"> quarterly ทุก 3 เดือน</option>
                    <option value="ทุก 6 เดือน"> half-yearly ทุก 6 เดือน</option>
                </select>
            </div>

            <div id="dayDiv" class="form-group hidden">
                <label for="selectedDay">เลือกวัน</label>
                <select id="selectedDay">
                    <option value="จันทร์">วันจันทร์</option>
                    <option value="อังคาร">วันอังคาร</option>
                    <option value="พุธ">วันพุธ</option>
                    <option value="พฤหัสบดี">วันพฤหัสบดี</option>
                    <option value="ศุกร์">วันศุกร์</option>
                    <option value="เสาร์">วันเสาร์</option>
                    <option value="อาทิตย์">วันอาทิตย์</option>
                </select>
            </div>

            <div id="dateDiv" class="form-group hidden">
                <label for="selectedDate">ระบุวันที่ของเดือน (1-31)</label>
                <select id="selectedDate">
                    <option value="" disabled selected>-- เลือกวันที่ --</option>
                    </select>
            </div>

            <div class="form-group">
                <label for="selectedTime">เวลาที่ต้องการให้เตือน</label>
                <input type="time" id="selectedTime" required>
            </div>

            <button type="submit" class="btn-submit">บันทึกการตั้งค่า</button>
        </form>
    </div>
    
   <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
        <script>
          const MY_LIFF_ID = "2010379470-8tkodFLS";
          const appsScriptUrl = "https://script.google.com/macros/s/AKfycbxkHcKCsM853RD225LZ7wUnxnBZF1D5HoEXnJm7FaLBY8h12oppFDkYmERoQwoTs9cf6w/exec";
        
          let currentUserId = "";
          let currentRowIdx = "";
        
          function populateDates() {
            const dateSelect = document.getElementById("selectedDate");
            dateSelect.innerHTML = '<option value="" disabled selected>-- เลือกวันที่ --</option>';
        
            for (let i = 1; i <= 31; i++) {
              let option = document.createElement("option");
              option.value = i;
              option.text = "วันที่ " + i;
              dateSelect.appendChild(option);
            }
          }
        
          function toggleDateFields() {
            const freq = document.getElementById("frequencyType").value;
            const dayDiv = document.getElementById("dayDiv");
            const dateDiv = document.getElementById("dateDiv");
        
            if (freq === "สัปดาห์") {
              dayDiv.classList.remove("hidden");
              dateDiv.classList.add("hidden");
              document.getElementById("selectedDate").value = "";
            } else if (freq === "ทุกเดือน" || freq === "ทุก 3 เดือน" || freq === "ทุก 6 เดือน") {
              dayDiv.classList.add("hidden");
              dateDiv.classList.remove("hidden");
              document.getElementById("selectedDay").value = "จันทร์";
            } else {
              dayDiv.classList.add("hidden");
              dateDiv.classList.add("hidden");
            }
          }
        
          window.onload = function() {
              populateDates();
            
              liff.init({ liffId: MY_LIFF_ID })
                .then(() => {
                  if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return Promise.reject("LOGIN_REDIRECT");
                  }
                  return liff.getProfile();
                })
                .then(profile => {
                  currentUserId = profile.userId;
                  document.getElementById("userId").value = currentUserId;
                  loadMyDocuments(currentUserId);
                })
                .catch(err => {
                  if (err === "LOGIN_REDIRECT") return;
                  alert("LIFF Error:\n\n" + (err.message || JSON.stringify(err)));
                });
            };

          function loadMyDocuments(userId) {
              const url = `${appsScriptUrl}?action=getDashboard&userId=${encodeURIComponent(userId)}`;
            
              fetch(url)
                .then(res => res.json())
                .then(data => {
                  const docs = data.docs || [];
                  const select = document.getElementById("docSelect");
            
                  if (docs.length === 0) {
                    select.innerHTML = `<option value="">ไม่พบเอกสารในระบบ</option>`;
                    document.getElementById("docNameDisplay").innerText = "ยังไม่มีเอกสารที่ผูกกับบัญชี LINE นี้";
                    return;
                  }
            
                  select.innerHTML = `<option value="" disabled selected>-- เลือกเอกสาร --</option>`;
            
                  docs.forEach(doc => {
                    const opt = document.createElement("option");
                    opt.value = doc.rowIdx;
                    opt.dataset.docName = doc.docName || "";
                    opt.dataset.alertDays = doc.alertDays || "";
                    opt.dataset.endDate = doc.endDate || "";
                    opt.textContent = `${doc.docName} | หมดอายุ ${doc.endDate} | เตือนก่อน ${doc.alertDays || "-"} วัน`;
                    select.appendChild(opt);
                  });
                })
                .catch(err => {
                  console.error(err);
                  document.getElementById("docSelect").innerHTML = `<option value="">โหลดเอกสารไม่สำเร็จ</option>`;
                });
            }
          function onSelectDocument() {
              const select = document.getElementById("docSelect");
              const opt = select.options[select.selectedIndex];
            
              document.getElementById("rowIdx").value = opt.value;
              document.getElementById("docName").value = opt.dataset.docName || "";
            
              document.getElementById("docNameDisplay").innerText =
                `อ้างอิงเอกสาร: ${opt.dataset.docName} | แจ้งเตือนก่อนหมดอายุ ${opt.dataset.alertDays || "-"} วัน`;
            }  
        
          function loadDocumentFromSystem(rowIdx, userId) {
            const url = `${appsScriptUrl}?action=getDocByRow&rowIdx=${encodeURIComponent(rowIdx)}&userId=${encodeURIComponent(userId)}`;
        
            fetch(url)
              .then(res => res.json())
              .then(doc => {
                if (doc.status !== "success") {
                  document.getElementById("docNameDisplay").innerText = doc.message || "ไม่พบข้อมูลเอกสาร";
                  return;
                }
        
                document.getElementById("docNameDisplay").innerText =
                  `อ้างอิงเอกสาร: ${doc.docName} | แจ้งเตือนก่อนหมดอายุ ${doc.alertDays || "-"} วัน`;
        
                document.getElementById("docName").value = doc.docName || "";
                document.getElementById("rowIdx").value = doc.rowIdx || "";
                document.getElementById("userId").value = currentUserId;
              })
              .catch(err => {
                console.error(err);
                document.getElementById("docNameDisplay").innerText = "ดึงข้อมูลเอกสารไม่สำเร็จ";
              });
          }
        
          document.getElementById("alertForm").addEventListener("submit", function(e) {
            e.preventDefault();
        
            const rowIdx = document.getElementById("rowIdx").value;
            const userId = document.getElementById("userId").value;
            const docName = document.getElementById("docName").value;
        
            if (!rowIdx || !userId || !docName) {
              alert("ข้อมูลเอกสารไม่ครบ กรุณากลับไปเปิดจากหน้าเอกสารของฉันอีกครั้ง");
              return;
            }
        
            const btn = document.querySelector(".btn-submit");
            const originalText = btn.innerText;
            btn.innerText = "กำลังบันทึก...";
            btn.disabled = true;
            btn.style.backgroundColor = "#5C6A82";
        
            const payload = {
              action: "saveAlertSchedule",
              data: {
                rowIdx: rowIdx,
                userId: userId,
                docName: docName,
                alertTopic: document.getElementById("alertTopic").value,
                frequencyType: document.getElementById("frequencyType").value,
                selectedDay: document.getElementById("frequencyType").value === "สัปดาห์"
                  ? document.getElementById("selectedDay").value
                  : "",
                selectedDate: document.getElementById("frequencyType").value !== "สัปดาห์"
                  ? document.getElementById("selectedDate").value
                  : "",
                selectedTime: document.getElementById("selectedTime").value || "09:00"
              }
            };
        
            fetch(appsScriptUrl, {
              method: "POST",
              headers: {
                "Content-Type": "text/plain;charset=utf-8"
              },
              body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(result => {
              if (result.status === "success") {
                alert("บันทึกการตั้งค่าเรียบร้อยแล้วค่ะ");
        
                if (liff.isInClient()) {
                  liff.closeWindow();
                }
              } else {
                throw new Error(result.message || "บันทึกไม่สำเร็จ");
              }
            })
            .catch(error => {
              console.error("Error:", error);
              alert("เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่อีกครั้ง");
        
              btn.innerText = originalText;
              btn.disabled = false;
              btn.style.backgroundColor = "#FFB700";
            });
          });
        </script>
</body>
</html>
